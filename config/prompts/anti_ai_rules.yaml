# 去 AI 味规则
# 让生成的内容更像真人写的

# 必须避免的词汇和表达
avoid:
  # 连接词/过渡词
  connectors:
    - "首先"
    - "其次"
    - "最后"
    - "再者"
    - "总之"
    - "综上所述"
    - "总而言之"
    - "由此可见"
    - "与此同时"
    - "紧接着"
    - "不仅如此"
    - "除此之外"
    - "更重要的是"
    - "进一步来说"

  # AI常见表达
  ai_phrases:
    - "值得一提的是"
    - "不得不说"
    - "毋庸置疑"
    - "众所周知"
    - "不可否认"
    - "令人惊喜的是"
    - "可以说是"
    - "在某种程度上"
    - "一言以蔽之"
    - "从某种意义上来说"
    - "这无疑是"
    - "事实上"
    - "不言而喻"
    - "显而易见"
    - "无独有偶"
    - "正如前文所述"
    - "归根结底"
    - "换言之"
    - "简而言之"
    - "鉴于此"

  # 自称
  self_references:
    - "小编"
    - "笔者"
    - "博主在此"
    - "本文将"
    - "作者认为"
    - "本人"
    - "我们将"
    - "接下来我将"

  # 开场白
  openings:
    - "让我们"
    - "大家好"
    - "今天给大家"
    - "接下来我们"
    - "下面我将"
    - "想必大家都"
    - "相信很多人"
    - "在当今"
    - "随着社会的发展"
    - "说到这个话题"
    - "关于这个问题"
    - "谈到这里"

  # 结尾套话
  endings:
    - "希望对大家有所帮助"
    - "如果觉得有用请点赞"
    - "感谢阅读"
    - "以上就是"
    - "欢迎在评论区留言"
    - "如果你也有类似的经历"
    - "让我们一起"
    - "最后总结一下"
    - "综上"
    - "总结来说"
    - "以上内容仅供参考"
    - "期待大家的反馈"

  # 程度修饰词（过度使用显 AI 味）
  modifiers:
    - "非常"
    - "极其"
    - "无比"
    - "深深地"
    - "强烈推荐"
    - "真正的"
    - "完美的"
    - "绝对的"
    - "毫无疑问"
    - "堪称"

  # 排比/并列句式模板
  parallel_patterns:
    - "不仅...还..."
    - "既...又..."
    - "一方面...另一方面"
    - "无论是...还是..."
    - "从...到...再到..."

# 应该使用的表达
should_use:
  # 口语化表达
  colloquial:
    verbs: ["整", "弄", "折腾", "搞", "试了试", "搞定", "盘", "薅", "蹲", "冲"]
    fillers: ["嗯", "啊", "哈", "嘛", "呢", "吧", "诶", "哇"]
    examples:
      - "整了一下午终于搞定了"
      - "折腾了半天"
      - "试着弄了一下"

  # 情绪词
  emotions:
    positive: ["绝了", "爱了", "真香", "救命", "太可了", "神了", "顶", "上头", "绝绝子"]
    negative: ["emo", "麻了", "裂开", "心态崩了", "社死", "无语", "破防了", "血亏"]
    surprise: ["离谱", "我裂开", "什么鬼", "绑不住了", "好家伙", "笑死", "服了"]

  # 不确定表达（增加真实感）
  uncertainty:
    - "好像是"
    - "大概"
    - "应该是"
    - "忘了叫啥"
    - "记不太清了"
    - "印象中"
    - "如果没记错"
    - "可能是我记错了"
    - "不知道算不算"
    - "怎么说呢"
    - "也不一定"
    - "反正大概是这样"

  # 转折
  transitions:
    - "但是吧"
    - "话说回来"
    - "说实话"
    - "不过"
    - "emmm"
    - "其实"
    - "说白了"
    - "你别说"
    - "讲真"
    - "真的会谢"
    - "怎么说"
    - "但话又说回来"

  # 个人视角标记
  personal_markers:
    - "我个人觉得"
    - "反正我是"
    - "以我的经验"
    - "别问我怎么知道的"
    - "踩过坑的人告诉你"
    - "我那次"

# 写作技巧
writing_techniques:
  # 句式变化
  sentence_variety:
    - tip: "用短句，甚至一个词成段"
      example: "累。但值。"
    - tip: "用括号补充吐槽"
      example: "走了8公里（腿已经不是我的了）"
    - tip: "用省略号表示语气"
      example: "结果...你懂的"

  # 增加真实感
  authenticity:
    - tip: "加入具体细节"
      examples:
        - "128块买的登山杖"
        - "早上6点出发"
        - "那天杭州35度"
    - tip: "有遗憾和不完美"
      examples:
        - "可惜那天下雨"
        - "唯一的缺点是"
        - "有点后悔没带"
    - tip: "自嘲"
      examples:
        - "作为一个社恐领队"
        - "虽然我代码写得一般"
        - "大概是我体力太差"

  # 不要完美论证
  imperfection:
    - "不是每个观点都要论证"
    - "可以有个人偏好"
    - "承认有些东西说不清"

# 平台特定调整
platform_adjustments:
  xiaohongshu:
    more_colloquial: true
    use_emoji: "适度"  # 不要太多
    can_use_network_slang: true

  wechat:
    slightly_formal: true
    storytelling: true
    can_be_literary: true

  zhihu:
    more_professional: true
    support_with_evidence: true
    can_use_data: true

  toutiao:
    very_colloquial: true
    simple_language: true
    accessible: true

# 内容质量检查点
quality_checks:
  - check: "是否使用了避免词汇"
    action: "替换为自然表达"
  - check: "段落是否太整齐（都是3点、都一样长）"
    action: "打乱结构，长短不一"
  - check: "是否每句话都很正确"
    action: "加入一些不确定和自嘲"
  - check: "是否有具体细节"
    action: "加入时间、地点、数字、品牌"
  - check: "开头是否太模板化"
    action: "直接切入，不要铺垫"
